# Render Blueprint for sports-oracle-ui (Next.js web app).
#
# This service reads from the same Postgres that sports-oracle-python writes to.
# You can either:
#   (A) Deploy the Python repo first (it defines the database), then connect
#       this UI to that database manually via its connection string.
#   (B) Put both render.yaml files in a monorepo — Render's blueprint
#       discovery will provision the DB once and wire env vars automatically.
#
# Steps for option (A) after pushing this repo to GitHub:
#   1. In Render → New → Blueprint → select this repo.
#   2. After provision, open this web service's settings and paste the
#      DATABASE_URL copied from the sports-oracle-db service.
#   3. Trigger a manual deploy.

services:
  - type: web
    name: sports-oracle-ui
    runtime: node
    plan: free               # 512 MB RAM; spins down after 15 min inactivity
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /slate
    envVars:
      # Paste the Internal Database URL (or External) from the Render
      # sports-oracle-db service's "Connect" tab.
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
