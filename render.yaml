# Render Blueprint for sports-oracle-ui (Next.js web app) — STATIC MODE.
#
# The database + pipeline stay on the user's local machine. Page data is
# exported as JSON snapshots (public/data/*.json) by the Python script
# `scripts/export_for_ui.py` and committed to this repo. Render serves the
# Next.js app; SSR reads the bundled JSON files. No DB, no DATABASE_URL.
#
# Workflow to update production:
#   1. Locally: python run_daily.py
#   2. Locally: python -m scripts.export_for_ui
#   3. cd sports-oracle-ui && git add public/data && git commit -m "data YYYY-MM-DD"
#   4. git push → Render auto-redeploys within ~2 min.

services:
  - type: web
    name: sports-oracle-ui
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /slate
    envVars:
      - key: DATA_MODE
        value: static
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
